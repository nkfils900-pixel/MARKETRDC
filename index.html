<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market RDC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans pb-20">

    <!-- En-tête -->
    <header class="bg-[#0D6EFD] p-4 text-white flex justify-between items-center">
        <h1 class="font-bold text-xl">Market RDC</h1>
        <div class="flex gap-4"><span>🔔</span><span>💬</span></div>
    </header>

    <!-- Recherche -->
    <div class="p-4"><input type="text" placeholder="Rechercher un produit..." class="w-full p-3 rounded-lg border"></div>

    <!-- Bannière -->
    <div class="mx-4 bg-[#0D6EFD] text-white p-6 rounded-xl">
        <h2 class="font-bold text-lg">Offres spéciales</h2>
        <p>Jusqu'à -30% sur une sélection !</p>
    </div>

    <!-- Section Produits -->
    <div class="p-4">
        <h2 class="font-bold text-lg mb-4">Produits recommandés</h2>
        <div class="grid grid-cols-2 gap-4">
            <!-- Produit 1 -->
            <div class="bg-white p-3 rounded-lg shadow">
                <div class="bg-gray-200 h-24 mb-2 rounded"></div>
                <h3 class="font-bold text-sm">Samsung Galaxy A14</h3>
                <p class="text-[#28A745] font-bold">250 000 FC</p>
            </div>
            <!-- Produit 2 -->
            <div class="bg-white p-3 rounded-lg shadow">
                <div class="bg-gray-200 h-24 mb-2 rounded"></div>
                <h3 class="font-bold text-sm">Nike Air Force 1</h3>
                <p class="text-[#28A745] font-bold">180 000 FC</p>
            </div>
        </div>
    </div>

    <!-- Navigation fixe en bas -->
    <nav class="fixed bottom-0 w-full bg-white border-t p-3 flex justify-around items-center">
        <div class="text-center text-[#0D6EFD]">🏠<br><span class="text-[10px]">Accueil</span></div>
        <div class="text-center">📦<br><span class="text-[10px]">Catégories</span></div>
        <div class="bg-[#28A745] text-white p-3 rounded-full -mt-8 font-bold">+</div>
        <div class="text-center">💬<br><span class="text-[10px]">Messages</span></div>
        <div class="text-center">👤<br><span class="text-[10px]">Profil</span></div>
    </nav>

</body>
</html>
